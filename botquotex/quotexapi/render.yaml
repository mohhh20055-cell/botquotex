# render.yaml
services:
  - type: web
    name: botquotex-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api_server:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: QUOTEX_EMAIL
        sync: false
      - key: QUOTEX_PASSWORD
        sync: false
      - key: PIP_NO_CACHE_DIR
        value: 1
