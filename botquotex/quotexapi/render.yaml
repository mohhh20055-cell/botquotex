# render.yaml
services:
  - type: web
    name: botquotex
    runtime: python
    buildCommand: pip install -r botquotex/quotexapi/requirements.txt
    startCommand: cd botquotex/quotexapi && gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: PIP_NO_CACHE_DIR
        value: 1
      - key: POETRY_VERSION
        value: ""  # تعطيل Poetry
