<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوت التداول الآلي - Quotex</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tahoma', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .status-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .stat-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        
        .control-panel {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin: 5px;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }
        
        button.danger {
            background: #dc3545;
        }
        
        button.success {
            background: #28a745;
        }
        
        .trade-history {
            background: white;
            border-radius: 10px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .trade-item {
            border-bottom: 1px solid #eee;
            padding: 10px;
            margin-bottom: 10px;
        }
        
        .trade-call {
            border-right: 4px solid #28a745;
        }
        
        .trade-put {
            border-right: 4px solid #dc3545;
        }
        
        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status-running {
            background: #28a745;
            color: white;
        }
        
        .status-stopped {
            background: #dc3545;
            color: white;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .loading {
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 بوت التداول الآلي - Quotex</h1>
            <p>تداول ذكي باستخدام الذكاء الاصطناعي والمؤشرات الفنية</p>
        </div>
        
        <div class="status-card">
            <h3>📊 حالة البوت</h3>
            <div id="botStatus">
                <span class="status-badge status-stopped">متوقف</span>
            </div>
            <div class="stats-grid" id="stats">
                <div class="stat-box">
                    <div class="stat-label">إجمالي الصفقات</div>
                    <div class="stat-value" id="totalTrades">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">الصفقات الرابحة</div>
                    <div class="stat-value" id="wins">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">الصفقات الخاسرة</div>
                    <div class="stat-value" id="losses">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">نسبة الربح</div>
                    <div class="stat-value" id="winRate">0%</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">إجمالي الربح</div>
                    <div class="stat-value" id="profit">$0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">الرصيد الحالي</div>
                    <div class="stat-value" id="balance">$0</div>
                </div>
            </div>
        </div>
        
        <div class="control-panel">
            <h3>⚙️ إعدادات التداول</h3>
            <form id="botConfig">
                <div class="form-group">
                    <label>زوج العملات</label>
                    <select id="asset">
                        <option value="EURUSD">EUR/USD</option>
                        <option value="GBPUSD">GBP/USD</option>
                        <option value="USDJPY">USD/JPY</option>
                        <option value="BTCUSD">BTC/USD</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>مبلغ الصفقة ($)</label>
                    <input type="number" id="amount" value="10" min="1" step="1">
                </div>
                
                <div class="form-group">
                    <label>مدة الصفقة (ثانية)</label>
                    <select id="duration">
                        <option value="60">دقيقة</option>
                        <option value="300">5 دقائق</option>
                        <option value="900">15 دقيقة</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>الاستراتيجية</label>
                    <select id="strategy">
                        <option value="combined">استراتيجية مدمجة (موصى بها)</option>
                        <option value="rsi">استراتيجية RSI</option>
                        <option value="macd">استراتيجية MACD</option>
                        <option value="bollinger">استراتيجية Bollinger</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>وضع الحساب</label>
                    <select id="demoMode">
                        <option value="true">حساب تجريبي (ديمو)</option>
                        <option value="false">حساب حقيقي ⚠️</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>عدد الصفقات (0 = غير محدود)</label>
                    <input type="number" id="maxTrades" value="10" min="0">
                </div>
                
                <div style="text-align: center;">
                    <button type="button" class="success" onclick="startBot()">▶️ تشغيل البوت</button>
                    <button type="button" class="danger" onclick="stopBot()">⏹️ إيقاف البوت</button>
                    <button type="button" onclick="refreshStatus()">🔄 تحديث الحالة</button>
                </div>
            </form>
        </div>
        
        <div class="trade-history">
            <h3>📜 سجل الصفقات</h3>
            <div id="tradeHistory">
                <p style="color: #999; text-align: center;">لا توجد صفقات بعد</p>
            </div>
        </div>
    </div>
    
    <script>
        let updateInterval;
        
        function startBot() {
            const config = {
                asset: document.getElementById('asset').value,
                amount: parseFloat(document.getElementById('amount').value),
                duration: parseInt(document.getElementById('duration').value),
                strategy: document.getElementById('strategy').value,
                demo_mode: document.getElementById('demoMode').value === 'true',
                max_trades: parseInt(document.getElementById('maxTrades').value)
            };
            
            fetch('/api/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(config)
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    alert('خطأ: ' + data.error);
                } else {
                    alert('✅ ' + data.message);
                    refreshStatus();
                    startAutoRefresh();
                }
            })
            .catch(error => {
                alert('خطأ في الاتصال: ' + error);
            });
        }
        
        function stopBot() {
            fetch('/api/stop', {method: 'POST'})
            .then(response => response.json())
            .then(data => {
                alert('⏹️ ' + data.message);
                refreshStatus();
            });
        }
        
        function refreshStatus() {
            fetch('/api/status')
            .then(response => response.json())
            .then(data => {
                if (data.connected) {
                    const stats = data.statistics;
                    document.getElementById('totalTrades').innerText = stats.total_trades || 0;
                    document.getElementById('wins').innerText = stats.wins || 0;
                    document.getElementById('losses').innerText = stats.losses || 0;
                    document.getElementById('winRate').innerText = (stats.win_rate || 0).toFixed(1) + '%';
                    document.getElementById('profit').innerText = '$' + (stats.profit || 0).toFixed(2);
                    document.getElementById('balance').innerText = '$' + (stats.current_balance || 0).toFixed(2);
                    
                    const statusBadge = document.getElementById('botStatus');
                    if (data.running) {
                        statusBadge.innerHTML = '<span class="status-badge status-running">🟢 يعمل</span>';
                    } else {
                        statusBadge.innerHTML = '<span class="status-badge status-stopped">🔴 متوقف</span>';
                    }
                } else {
                    document.getElementById('botStatus').innerHTML = '<span class="status-badge status-stopped">❌ غير متصل</span>';
                }
            });
            
            // جلب الرصيد
            fetch('/api/balance')
            .then(response => response.json())
            .then(data => {
                if (data.balance !== undefined) {
                    document.getElementById('balance').innerText = '$' + data.balance.toFixed(2);
                }
            });
        }
        
        function startAutoRefresh() {
            if (updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(refreshStatus, 3000);
        }
        
        // تحديث أولي
        refreshStatus();
        startAutoRefresh();
    </script>
</body>
</html>
